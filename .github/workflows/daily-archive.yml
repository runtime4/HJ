name: Daily Hand Jumper Archiver

on:
  schedule:
    # Runs at 22:00 UTC every day
    - cron: '0 22 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  archive:
    runs-on: ubuntu-latest
    
    # Needs write permissions to push the new episodes back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pillow

      - name: Run Webtoon scraper
        run: python archive_hand_jumper.py

      - name: Convert new images to WEBP
        run: python convert_to_webp.py

      - name: Generate static pages & index
        run: python pages.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Daily Archive Update"
          branch: main
          file_pattern: 'episodes/** data.js index.html directory.html'
